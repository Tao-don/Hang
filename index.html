<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop Manager V9.2 - Iconic CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root { --deep-teal: #034C5F; --light-teal: #97BEC6; --coral: #EE6457; --soft-pink: #F9C4BA; --bg-creamy: #FDF5F4; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-creamy); color: #1e293b; }
        .form-input { width: 100%; padding: 10px 12px 10px 40px; border-radius: 12px; border: 1px solid var(--soft-pink); font-size: 14px; transition: all 0.3s; background: white; }
        .form-input:focus { border-color: var(--deep-teal); outline: none; box-shadow: 0 0 0 3px rgba(3, 76, 95, 0.1); }
        .input-group { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--light-teal); font-size: 14px; }
        .card { background: white; border-radius: 24px; border: 1px solid var(--soft-pink); box-shadow: 0 4px 15px rgba(238, 100, 87, 0.05); }
        .btn-main { background-color: var(--deep-teal); color: white; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .btn-accent { background-color: var(--coral); color: white; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .crm-input { background: transparent; border: none; width: 100%; font-size: 13px; padding: 6px; border-radius: 6px; }
        .crm-input:focus { background: white; box-shadow: 0 0 0 1px var(--light-teal); outline: none; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white/90 backdrop-blur-md border-b border-soft-pink sticky top-0 z-40">
        <div class="container mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-[#034C5F] rounded-xl flex items-center justify-center text-white shadow-md"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <h1 class="font-extrabold text-[#034C5F] tracking-tight text-xl uppercase">Sunset<span class="text-[#EE6457] font-light">Shop</span></h1>
            </div>
            <nav class="flex bg-[#FDF5F4] p-1 rounded-2xl border border-[#F9C4BA]">
                <button onclick="switchTab('orders')" id="tab-orders" class="px-4 py-2 rounded-xl text-sm font-bold transition-all bg-white text-[#034C5F] shadow-sm"><i class="fa-solid fa-cart-shopping mr-1"></i> Đơn</button>
                <button onclick="switchTab('analytics')" id="tab-analytics" class="px-4 py-2 rounded-xl text-sm font-medium text-[#034C5F] transition-all"><i class="fa-solid fa-chart-line mr-1"></i> Báo cáo</button>
                <button onclick="switchTab('customers')" id="tab-customers" class="px-4 py-2 rounded-xl text-sm font-medium text-[#034C5F] transition-all"><i class="fa-solid fa-users mr-1"></i> Khách</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 lg:max-w-7xl">
        <div id="view-orders" class="space-y-6">
            <section class="card p-6 border-t-[10px] border-[#034C5F]">
                <form id="orderForm" onsubmit="event.preventDefault();" class="space-y-6">
                    <input type="hidden" id="editOrderId" value="">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <label class="text-xs font-bold text-[#034C5F] uppercase flex items-center gap-2"><i class="fa-solid fa-address-card"></i> Thông tin khách hàng</label>
                            <div class="input-group">
                                <i class="fa-solid fa-phone input-icon"></i>
                                <input type="text" id="custPhone" list="phoneDataList" onchange="autoFillByPhone()" class="form-input" placeholder="Số điện thoại...">
                            </div>
                            <div class="input-group">
                                <i class="fa-solid fa-user input-icon"></i>
                                <input type="text" id="custName" list="nameDataList" onchange="autoFillByName()" class="form-input" placeholder="Tên khách hàng">
                            </div>
                            <datalist id="phoneDataList"></datalist>
                            <datalist id="nameDataList"></datalist>
                        </div>
                        <div class="space-y-4">
                            <label class="text-xs font-bold text-[#034C5F] uppercase flex items-center gap-2"><i class="fa-solid fa-map-location-dot"></i> Địa chỉ giao hàng</label>
                            <div class="relative">
                                <i class="fa-solid fa-house input-icon" style="top: 20px;"></i>
                                <textarea id="custAddr" class="form-input h-[105px] resize-none py-3" placeholder="Địa chỉ chi tiết..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-bold text-[#034C5F] uppercase flex items-center gap-2"><i class="fa-solid fa-bag-shopping"></i> Danh sách sản phẩm</label>
                        <div id="product-list" class="space-y-3"></div>
                        <button type="button" onclick="addProductRow()" class="w-full py-3 bg-[#FDF5F4] border-2 border-dashed border-[#F9C4BA] rounded-xl text-[#034C5F] text-xs font-bold hover:bg-[#F9C4BA]/30 transition-all"><i class="fa-solid fa-plus-circle mr-1"></i> THÊM MẶT HÀNG MỚI</button>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-4 border-t border-[#F9C4BA]">
                        <div class="input-group"><label class="text-[10px] font-bold text-[#97BEC6] uppercase">Ngày gửi</label><input type="date" id="shipDate" onchange="autoSetDeliveryDate()" class="form-input !pl-3 mt-1"></div>
                        <div class="input-group"><label class="text-[10px] font-bold text-[#97BEC6] uppercase">Ngày nhận</label><input type="date" id="deliveryDate" class="form-input !pl-3 mt-1"></div>
                        <div>
                            <label class="text-[10px] font-bold text-[#97BEC6] uppercase">Thanh toán</label>
                            <select id="payMethod" class="form-input !pl-3 mt-1"><option>COD (Shipper)</option><option>Chuyển khoản</option><option>Tiền mặt</option></select>
                        </div>
                        <div class="input-group"><label class="text-[10px] font-bold text-[#97BEC6] uppercase">Ghi chú</label><input type="text" id="orderNote" class="form-input !pl-3 mt-1" placeholder="..."></div>
                    </div>

                    <div class="flex flex-col md:flex-row justify-between items-center bg-[#034C5F] text-white p-6 rounded-[28px] gap-6 shadow-xl">
                        <div class="flex gap-4">
                            <div class="text-center"><label class="text-[10px] mb-1 block">Ship <i class="fa-solid fa-truck-fast ml-1"></i></label><input type="number" id="shipFee" oninput="calculateTotal()" class="form-input !pl-3 w-24 text-[#034C5F]" value="0"></div>
                            <div class="text-center"><label class="text-[10px] mb-1 block">Giảm <i class="fa-solid fa-tag ml-1"></i></label><div class="flex"><input type="number" id="discountVal" oninput="calculateTotal()" class="form-input !pl-3 rounded-r-none w-16 text-[#034C5F]" value="0"><select id="discountType" onchange="calculateTotal()" class="bg-white text-[#034C5F] rounded-r-xl text-[10px] px-1 font-bold"><option value="percent">%</option><option value="amount">₫</option></select></div></div>
                        </div>
                        <div class="text-center md:text-right">
                            <span class="text-xs text-[#97BEC6] uppercase font-bold tracking-widest">TỔNG THỰC THU</span>
                            <div class="text-4xl font-black" id="finalTotal">0 ₫</div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button type="button" onclick="resetForm()" class="px-5 py-4 bg-[#023846] rounded-xl text-xs uppercase font-extrabold hover:bg-black transition-all"><i class="fa-solid fa-rotate-left"></i></button>
                            <button onclick="saveOrder()" id="btnSave" class="flex-1 px-10 py-4 bg-[#EE6457] rounded-xl font-bold shadow-lg uppercase hover:scale-105 transition-all"><i class="fa-solid fa-check-double mr-2"></i>Lưu đơn hàng</button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="card overflow-hidden">
                <div class="p-4 bg-white border-b border-soft-pink flex justify-between items-center">
                    <h3 class="font-bold text-[#034C5F] text-sm uppercase tracking-tighter"><i class="fa-solid fa-rectangle-list mr-2"></i>Danh sách đơn hàng</h3>
                    <button onclick="exportOrdersToExcel()" class="bg-[#FDF5F4] text-[#EE6457] px-4 py-2 rounded-xl text-xs font-bold border border-[#F9C4BA] hover:bg-[#EE6457] hover:text-white transition-all"><i class="fa-solid fa-file-csv mr-1"></i> XUẤT EXCEL</button>
                </div>
                <div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead class="bg-[#FDF5F4] text-[10px] font-bold text-[#034C5F] uppercase"><tr><th class="p-4">Khách hàng</th><th class="p-4">Sản phẩm</th><th class="p-4 text-center">Trạng thái</th><th class="p-4 text-right">Tổng thu</th><th class="p-4 text-center">Thao tác</th></tr></thead><tbody id="orderTableBody" class="divide-y divide-[#F9C4BA]/20"></tbody></table></div>
            </section>
        </div>

        <div id="view-analytics" class="hidden space-y-6">
            <div class="card p-4 flex flex-wrap gap-3 items-center bg-white">
                <div class="flex items-center gap-2"><i class="fa-solid fa-calendar-days text-[#034C5F]"></i><input type="date" id="filterStart" class="form-input !pl-3 w-auto text-xs"></div>
                <div class="flex items-center gap-2"><i class="fa-solid fa-arrow-right text-[#97BEC6]"></i><input type="date" id="filterEnd" class="form-input !pl-3 w-auto text-xs"></div>
                <button onclick="renderAnalytics()" class="btn-main px-6 py-2 text-xs uppercase"><i class="fa-solid fa-magnifying-glass-chart mr-1"></i> Xem báo cáo</button>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="statCards"></div>
            <div class="bg-white p-10 rounded-[40px] border-2 border-[#F9C4BA] text-center shadow-inner relative overflow-hidden">
                <i class="fa-solid fa-coins absolute -left-4 -bottom-4 text-[120px] text-[#FDF5F4]"></i>
                <p class="text-[#97BEC6] text-xs font-bold uppercase tracking-[0.3em] relative z-10">Lợi nhuận thuần giai đoạn</p>
                <h2 class="text-6xl font-black mt-2 text-[#034C5F] relative z-10" id="totalPeriodRevenue">0 ₫</h2>
            </div>
        </div>

        <div id="view-customers" class="hidden space-y-4">
            <div class="card overflow-hidden">
                <div class="p-4 bg-[#034C5F] text-white flex justify-between items-center">
                    <h3 class="font-bold text-sm uppercase"><i class="fa-solid fa-address-book mr-2"></i>Dữ liệu khách hàng & CRM</h3>
                    <button onclick="exportCustomersToExcel()" class="text-[10px] bg-white/20 px-3 py-1 rounded-lg border border-white/30 hover:bg-white/40"><i class="fa-solid fa-download mr-1"></i> Tải CSV</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm min-w-[1000px]">
                        <thead class="bg-[#FDF5F4] text-[10px] font-bold text-[#034C5F] uppercase">
                            <tr>
                                <th class="p-4"><i class="fa-solid fa-user mr-1"></i> Tên Khách</th>
                                <th class="p-4"><i class="fa-solid fa-phone mr-1"></i> Số điện thoại</th>
                                <th class="p-4"><i class="fa-solid fa-map-location mr-1"></i> Địa chỉ chi tiết</th>
                                <th class="p-4"><i class="fa-solid fa-cake-candles mr-1"></i> Sinh nhật</th>
                                <th class="p-4"><i class="fa-solid fa-briefcase mr-1"></i> Công việc</th>
                                <th class="p-4"><i class="fa-solid fa-note-sticky mr-1"></i> Ghi chú</th>
                                <th class="p-4 text-right"><i class="fa-solid fa-star text-yellow-500 mr-1"></i> Tổng chi</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody" class="divide-y divide-[#F9C4BA]/30"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="invoiceModal" class="fixed inset-0 bg-[#034C5F]/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md overflow-y-auto">
        <div class="my-auto">
            <div id="invoiceContent" class="bg-white rounded-[32px] overflow-hidden shadow-2xl" style="width: 450px;"></div>
            <div class="mt-4 flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-white/10 py-4 rounded-xl text-white font-bold border border-white/20 hover:bg-white/20 transition-all">ĐÓNG</button>
                <button onclick="downloadImage()" class="flex-1 bg-[#EE6457] py-4 rounded-xl text-white font-bold shadow-lg hover:bg-[#d85449] transition-all"><i class="fa-solid fa-image mr-2"></i>LƯU ẢNH HÓA ĐƠN</button>
            </div>
        </div>
    </div>

    <script>
        const STATUS_OPTIONS = ["Đợi gửi", "Đang giao", "HD Sử dụng", "Chăm sóc", "Xử lý", "Đã Hủy"];
        const STATUS_COLORS = { "Đợi gửi": "bg-slate-100 text-slate-600", "Đang giao": "bg-blue-100 text-blue-700", "HD Sử dụng": "bg-indigo-100 text-indigo-700", "Chăm sóc": "bg-emerald-100 text-emerald-700", "Xử lý": "bg-amber-100 text-amber-700", "Đã Hủy": "bg-red-100 text-red-700" };
        const OUT_KEYWORDS = ['BND', 'NƯỚC HOA', 'SERUM'];

        let orders = JSON.parse(localStorage.getItem('v92_orders')) || [];
        let customers = JSON.parse(localStorage.getItem('v92_customers')) || {};
        const formatMoney = (n) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);

        // -- CRM LOGIC --
        function renderCustomerCRM() {
            const tbody = document.getElementById('customerTableBody');
            const spendings = {}; 
            orders.forEach(o => spendings[o.customer.phone] = (spendings[o.customer.phone] || 0) + o.total);
            tbody.innerHTML = Object.keys(customers).map(phone => {
                const c = customers[phone];
                return `
                <tr class="hover:bg-white transition-colors">
                    <td class="p-3"><input type="text" value="${c.name}" onchange="updateCustomerField('${phone}', 'name', this.value)" class="crm-input font-bold text-[#034C5F]"></td>
                    <td class="p-3"><input type="text" value="${phone}" onchange="updateCustomerPhone('${phone}', this.value)" class="crm-input font-mono text-[#EE6457]"></td>
                    <td class="p-3"><input type="text" value="${c.address || ''}" onchange="updateCustomerField('${phone}', 'address', this.value)" class="crm-input" placeholder="Địa chỉ..."></td>
                    <td class="p-3"><input type="date" value="${c.birthday || ''}" onchange="updateCustomerField('${phone}', 'birthday', this.value)" class="crm-input text-xs"></td>
                    <td class="p-3"><input type="text" value="${c.job || ''}" onchange="updateCustomerField('${phone}', 'job', this.value)" class="crm-input"></td>
                    <td class="p-3"><input type="text" value="${c.note || ''}" onchange="updateCustomerField('${phone}', 'note', this.value)" class="crm-input italic"></td>
                    <td class="p-3 text-right font-black text-[#034C5F]">${formatMoney(spendings[phone] || 0)}</td>
                </tr>`;
            }).join('');
        }

        function updateCustomerField(phone, field, value) { if (customers[phone]) { customers[phone][field] = value; saveCRM(); } }
        function updateCustomerPhone(oldPhone, newPhone) {
            if (newPhone === oldPhone) return;
            if (customers[newPhone]) { alert("SĐT này đã tồn tại!"); renderCustomerCRM(); return; }
            customers[newPhone] = { ...customers[oldPhone] }; delete customers[oldPhone];
            orders.forEach(o => { if (o.customer.phone === oldPhone) o.customer.phone = newPhone; });
            localStorage.setItem('v92_orders', JSON.stringify(orders)); saveCRM(); renderCustomerCRM(); updateDatalists();
        }
        function saveCRM() { localStorage.setItem('v92_customers', JSON.stringify(customers)); }

        // -- ORDER & UI --
        function addProductRow(name = "", price = "", qty = 1) {
            const container = document.getElementById('product-list');
            const div = document.createElement('div');
            div.className = "grid grid-cols-1 sm:grid-cols-[2fr,1fr,0.5fr,auto] gap-2 bg-white p-3 border border-soft-pink rounded-xl items-center shadow-sm";
            div.innerHTML = `
                <div class="input-group"><i class="fa-solid fa-cube input-icon"></i><input type="text" class="form-input p-name" placeholder="Tên SP..." value="${name}" required></div>
                <div class="input-group"><i class="fa-solid fa-money-bill-1-wave input-icon"></i><input type="number" class="form-input p-price font-bold text-[#034C5F]" placeholder="Giá" value="${price}" oninput="calculateTotal()" required></div>
                <input type="number" class="form-input !pl-3 p-qty text-center" value="${qty}" oninput="calculateTotal()" required>
                <button type="button" onclick="this.parentElement.remove(); calculateTotal()" class="text-[#F9C4BA] hover:text-[#EE6457] p-2 transition-colors"><i class="fa-solid fa-trash-can text-lg"></i></button>`;
            container.appendChild(div);
            calculateTotal();
        }

        function calculateTotal() {
            let subtotal = 0;
            document.querySelectorAll('.p-name').forEach((el, idx) => {
                const price = parseFloat(document.querySelectorAll('.p-price')[idx].value) || 0;
                const qty = parseFloat(document.querySelectorAll('.p-qty')[idx].value) || 0;
                subtotal += price * qty;
            });
            const ship = parseFloat(document.getElementById('shipFee').value) || 0;
            const dVal = parseFloat(document.getElementById('discountVal').value) || 0;
            const dType = document.getElementById('discountType').value;
            let disc = dType === 'percent' ? subtotal * (dVal/100) : dVal;
            let total = Math.max(0, subtotal - disc + ship);
            document.getElementById('finalTotal').innerText = formatMoney(total);
            return { subtotal, total };
        }

        function saveOrder() {
            const phone = document.getElementById('custPhone').value;
            const name = document.getElementById('custName').value;
            const addr = document.getElementById('custAddr').value;
            if(!phone || !name) return alert("Vui lòng điền Tên và SĐT khách!");
            let products = [];
            document.querySelectorAll('.p-name').forEach((el, idx) => {
                products.push({ name: el.value, price: parseFloat(document.querySelectorAll('.p-price')[idx].value) || 0, qty: parseInt(document.querySelectorAll('.p-qty')[idx].value) || 1 });
            });
            if(products.length === 0) return alert("Chưa có sản phẩm!");
            if(!customers[phone]) customers[phone] = { name, address: addr, birthday: '', job: '', note: '' };
            else { customers[phone].name = name; customers[phone].address = addr; }
            const { subtotal, total } = calculateTotal();
            const id = document.getElementById('editOrderId').value;
            const order = { id: id ? parseInt(id) : Date.now(), timestamp: id ? orders.find(x=>x.id==id).timestamp : Date.now(), customer: { name, phone, addr }, products, payMethod: document.getElementById('payMethod').value, shipFee: parseFloat(document.getElementById('shipFee').value) || 0, discount: { val: parseFloat(document.getElementById('discountVal').value)||0, type: document.getElementById('discountType').value }, date: document.getElementById('shipDate').value, deliveryDate: document.getElementById('deliveryDate').value, note: document.getElementById('orderNote').value.trim(), subtotal, total, status: id ? orders.find(x => x.id == id).status : "Đợi gửi" };
            if(id) orders[orders.findIndex(o => o.id == id)] = order; else orders.unshift(order);
            localStorage.setItem('v92_orders', JSON.stringify(orders)); saveCRM(); renderTable(); resetForm(); updateDatalists();
        }

        function renderTable() {
            document.getElementById('orderTableBody').innerHTML = orders.map(o => `
                <tr class="hover:bg-[#FDF5F4]/50 transition-colors">
                    <td class="p-4"><b>${o.customer.name}</b><br><span class="text-xs text-[#97BEC6]">${o.customer.phone}</span></td>
                    <td class="p-4 text-xs text-slate-500 line-clamp-1">${o.products.map(p => `${p.name}`).join(', ')}</td>
                    <td class="p-4 text-center"><button onclick="updateStatus(${o.id})" class="status-badge ${STATUS_COLORS[o.status]}">${o.status}</button></td>
                    <td class="p-4 text-right font-bold text-[#EE6457]">${formatMoney(o.total)}</td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-3">
                            <button onclick="openInvoice(${o.id})" class="text-[#97BEC6] hover:text-[#034C5F]"><i class="fa-solid fa-receipt text-lg"></i></button>
                            <button onclick="editOrder(${o.id})" class="text-[#97BEC6] hover:text-[#034C5F]"><i class="fa-solid fa-pen-to-square text-lg"></i></button>
                            <button onclick="deleteOrder(${o.id})" class="text-slate-200 hover:text-red-400"><i class="fa-solid fa-trash text-lg"></i></button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        // -- CORE FEATURES --
        function openInvoice(id) {
            const o = orders.find(x => x.id === id);
            const noteHtml = o.note ? `<div style="padding:15px; background:#FDF5F4; border-radius:12px; font-size:12px; color:#034C5F; margin:15px 0; border:1px solid #F9C4BA;"><b style="color:#EE6457">Ghi chú:</b> ${o.note}</div>` : '<div style="margin-top:20px"></div>';
            document.getElementById('invoiceContent').innerHTML = `
                <div style="padding:40px 30px; text-align:center; background:white;">
                    <h1 style="margin:0; font-size:32px; font-weight:900; color:#034C5F; letter-spacing:1px;">HÓA ĐƠN</h1>
                    <p style="margin:8px 0 0 0; color:#EE6457; font-size:14px; font-weight:600;">🌷 Mọi sản phẩm gửi đi là cả tấm lòng 🌷</p>
                </div>
                <div style="padding:0 30px 30px 30px; background:white;">
                    <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f5f9; padding-bottom:15px; margin-bottom:15px;">
                        <div>
                            <p style="font-weight:800; font-size:16px; margin:0; color:#034C5F;">${o.customer.name}</p>
                            <p style="color:#444; font-size:13px; margin:3px 0;">${o.customer.phone}</p>
                            <p style="color:#888; font-size:11px; margin:0;">${o.customer.addr}</p>
                        </div>
                        <div style="text-align:right; font-size:11px; color:#64748b;">
                            <p>Ngày gửi: <b>${o.date.split('-').reverse().join('/')}</b></p>
                            <p>Ngày nhận: <b>${o.deliveryDate.split('-').reverse().join('/')}</b></p>
                            <p style="color:#EE6457; font-weight:800; margin-top:5px; text-transform:uppercase;">${o.payMethod}</p>
                        </div>
                    </div>
                    <table style="width:100%; border-collapse:collapse; font-size:13px;">
                        ${o.products.map(p => `<tr><td style="padding:10px 0; border-bottom:1px solid #f8fafc;">${p.name} (x${p.qty})</td><td style="text-align:right; font-weight:700; color:#034C5F;">${formatMoney(p.price*p.qty)}</td></tr>`).join('')}
                    </table>
                    ${noteHtml}
                    <div style="border-top:2px solid #034C5F; padding-top:15px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px; color:#64748b; margin-bottom:4px;"><span>Vận chuyển:</span><span>+ ${formatMoney(o.shipFee)}</span></div>
                        <div style="display:flex; justify-content:space-between; font-size:12px; color:#EE6457; margin-bottom:10px;"><span>Giảm giá:</span><span>- ${o.discount.val}${o.discount.type==='percent'?'%':'₫'}</span></div>
                        <div style="display:flex; justify-content:space-between; font-weight:900; font-size:28px; color:#034C5F;"><span>TỔNG THU:</span><span>${formatMoney(o.total)}</span></div>
                    </div>
                    <div style="text-align:center; margin-top:40px; border-top:1px dashed #eee; padding-top:20px;">
                        <p style="font-size:12px; color:#034C5F; font-weight:700;">🍀 Cảm ơn đã tin tưởng và đồng hành với Shop 🍀</p>
                    </div>
                </div>`;
            document.getElementById('invoiceModal').classList.remove('hidden');
        }

        function renderAnalytics() {
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;
            let filtered = orders.filter(o => o.status !== "Đã Hủy" && (!start || o.date >= start) && (!end || o.date <= end));
            let sOut = 0, sVnl = 0, sNew = 0, sTtd = 0;
            filtered.forEach(o => {
                const netOrder = o.total - o.shipFee;
                o.products.forEach(p => {
                    const ratio = o.subtotal > 0 ? (p.price * p.qty / o.subtotal) : 0;
                    if(OUT_KEYWORDS.some(k => p.name.toUpperCase().includes(k))) sOut += ratio * netOrder; else sVnl += ratio * netOrder;
                });
                const isNew = orders.filter(prev => prev.customer.phone === o.customer.phone && prev.timestamp < o.timestamp).length === 0;
                if(isNew) sNew += netOrder; else sTtd += netOrder;
            });
            document.getElementById('statCards').innerHTML = `
                <div class="card p-5 border-l-4 border-[#034C5F]"><div class="flex justify-between items-start"><p class="text-[9px] font-bold text-[#97BEC6]">DOANH SỐ NGOÀI</p><i class="fa-solid fa-parachute-box text-[#034C5F]"></i></div><h3 class="text-xl font-black text-[#034C5F] mt-1">${formatMoney(sOut)}</h3></div>
                <div class="card p-5 border-l-4 border-[#034C5F]"><div class="flex justify-between items-start"><p class="text-[9px] font-bold text-[#97BEC6]">DOANH SỐ VNL</p><i class="fa-solid fa-vial-circle-check text-[#034C5F]"></i></div><h3 class="text-xl font-black text-[#034C5F] mt-1">${formatMoney(sVnl)}</h3></div>
                <div class="card p-5 border-l-4 border-[#EE6457]"><div class="flex justify-between items-start"><p class="text-[9px] font-bold text-[#F9C4BA]">KHÁCH MỚI</p><i class="fa-solid fa-user-plus text-[#EE6457]"></i></div><h3 class="text-xl font-black text-[#EE6457] mt-1">${formatMoney(sNew)}</h3></div>
                <div class="card p-5 border-l-4 border-[#EE6457]"><div class="flex justify-between items-start"><p class="text-[9px] font-bold text-[#F9C4BA]">KHÁCH TTD</p><i class="fa-solid fa-heart-circle-check text-[#EE6457]"></i></div><h3 class="text-xl font-black text-[#EE6457] mt-1">${formatMoney(sTtd)}</h3></div>`;
            document.getElementById('totalPeriodRevenue').innerText = formatMoney(sOut + sVnl);
        }

        // -- HELPERS --
        function switchTab(t) {
            ['view-orders', 'view-analytics', 'view-customers'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(`view-${t}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.className = "px-4 py-2 rounded-xl text-sm font-medium text-[#034C5F]");
            document.getElementById(`tab-${t}`).className = "px-4 py-2 rounded-xl text-sm font-bold bg-white text-[#034C5F] shadow-sm";
            if(t === 'analytics') renderAnalytics();
            if(t === 'customers') renderCustomerCRM();
        }
        function autoFillByPhone() { const p = document.getElementById('custPhone').value; if(customers[p]) { document.getElementById('custName').value = customers[p].name; document.getElementById('custAddr').value = customers[p].address; } }
        function autoFillByName() { const n = document.getElementById('custName').value; const p = Object.keys(customers).find(k => customers[k].name === n); if(p) { document.getElementById('custPhone').value = p; document.getElementById('custAddr').value = customers[p].address; } }
        function updateDatalists() {
            document.getElementById('phoneDataList').innerHTML = Object.keys(customers).map(p => `<option value="${p}">${customers[p].name}</option>`).join('');
            document.getElementById('nameDataList').innerHTML = Object.keys(customers).map(p => `<option value="${customers[p].name}">${p}</option>`).join('');
        }
        function updateStatus(id) { const o = orders.find(x => x.id === id); o.status = STATUS_OPTIONS[(STATUS_OPTIONS.indexOf(o.status) + 1) % STATUS_OPTIONS.length]; localStorage.setItem('v92_orders', JSON.stringify(orders)); renderTable(); }
        function deleteOrder(id) { if(confirm("Xoá vĩnh viễn đơn hàng này?")) { orders = orders.filter(o => o.id !== id); localStorage.setItem('v92_orders', JSON.stringify(orders)); renderTable(); } }
        function autoSetDeliveryDate() { const shipDateVal = document.getElementById('shipDate').value; if (shipDateVal) { const date = new Date(shipDateVal); date.setDate(date.getDate() + 3); document.getElementById('deliveryDate').value = date.toISOString().split('T')[0]; } }
        function resetForm() { document.getElementById('orderForm').reset(); document.getElementById('editOrderId').value = ""; document.getElementById('product-list').innerHTML = ""; addProductRow(); document.getElementById('shipDate').valueAsDate = new Date(); autoSetDeliveryDate(); calculateTotal(); document.getElementById('btnSave').innerHTML = '<i class="fa-solid fa-check-double mr-2"></i>Lưu đơn hàng'; }
        function editOrder(id) { const o = orders.find(x => x.id === id); document.getElementById('editOrderId').value = o.id; document.getElementById('custPhone').value = o.customer.phone; document.getElementById('custName').value = o.customer.name; document.getElementById('custAddr').value = o.customer.addr; document.getElementById('product-list').innerHTML = ""; o.products.forEach(p => addProductRow(p.name, p.price, p.qty)); document.getElementById('payMethod').value = o.payMethod; document.getElementById('shipFee').value = o.shipFee; document.getElementById('discountVal').value = o.discount.val; document.getElementById('discountType').value = o.discount.type; document.getElementById('shipDate').value = o.date; document.getElementById('deliveryDate').value = o.deliveryDate; document.getElementById('orderNote').value = o.note || ''; document.getElementById('btnSave').innerHTML = '<i class="fa-solid fa-rotate mr-2"></i>Cập nhật đơn'; calculateTotal(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function closeModal() { document.getElementById('invoiceModal').classList.add('hidden'); }
        function downloadImage() { html2canvas(document.getElementById('invoiceContent'), { scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = `HD_${Date.now()}.png`; link.href = canvas.toDataURL(); link.click(); }); }
        
        // -- EXPORT FUNCTIONS --
        function exportOrdersToExcel() {
            let csv = "\ufeffMã Đơn,Ngày Gửi,Khách Hàng,SĐT,Sản Phẩm,Tổng Thu,Trạng Thái\n";
            orders.forEach(o => { csv += `${o.id},${o.date},"${o.customer.name}","${o.customer.phone}","${o.products.map(p=>p.name).join(' | ')}",${o.total},${o.status}\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "DanhSachDonHang.csv"; link.click();
        }
        function exportCustomersToExcel() {
            let csv = "\ufeffTên Khách,Số Điện Thoại,Địa Chỉ,Sinh Nhật,Công Việc,Ghi Chú\n";
            Object.keys(customers).forEach(p => { const c = customers[p]; csv += `"${c.name}","${p}","${c.address}","${c.birthday}","${c.job}","${c.note}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "DuLieuKhachHang.csv"; link.click();
        }

        document.getElementById('shipDate').valueAsDate = new Date();
        autoSetDeliveryDate(); addProductRow(); renderTable(); updateDatalists();
    </script>
</body>
</html>
